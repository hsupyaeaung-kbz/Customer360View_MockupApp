<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer 360 Mockup</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <!-- React will attach to this div -->
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { 
            Search, User, CreditCard, Wallet, Building2, Briefcase, 
            Smartphone, Receipt, Coins, FileText, ChevronRight, Lock, 
            Unlock, RefreshCcw, PlusCircle, Bell, CheckCircle2, AlertCircle, 
            LogOut, ArrowLeft 
        } from 'https://esm.sh/lucide-react@0.294.0?deps=react@18';

        // --- Mock Data ---
        const CUSTOMER_DATA = {
            id: "CUST-99281",
            name: "Alexander Sterling",
            tier: "Platinum",
            email: "a.sterling@example.com",
            phone: "+1 (555) 012-3456",
            nationalId: "NID-8827-X",
            dob: "1985-05-12",
            status: "Verified",
            riskScore: "Low",
        };

        const CATEGORIES = [
            { id: 'wallet', name: 'Wallet', icon: Wallet, color: 'bg-purple-500', summary: 'Bal: $1,240.50', status: 'Active' },
            { id: 'banking_retail', name: 'Banking (Retail)', icon: Building2, color: 'bg-blue-500', summary: '2 Accounts Active', status: 'Good' },
            { id: 'banking_corporate', name: 'Banking (Corporate)', icon: Briefcase, color: 'bg-indigo-600', summary: '1 Pending Approval', status: 'Action Req' },
            { id: 'cards', name: 'Cards', icon: CreditCard, color: 'bg-emerald-500', summary: '3 Cards Issued', status: 'Secure' },
            { id: 'digital_service', name: 'Digital Service', icon: Smartphone, color: 'bg-cyan-500', summary: 'Last login: 2h ago', status: 'Online' },
            { id: 'billing', name: 'Billing (Merchant)', icon: Receipt, color: 'bg-orange-500', summary: '$4,200 Revenue', status: 'Settled' },
            { id: 'loans', name: 'Loans', icon: Coins, color: 'bg-rose-500', summary: 'Next due: Oct 20', status: 'Current' },
            { id: 'invoicing', name: 'Invoicing', icon: FileText, color: 'bg-amber-500', summary: '5 Unpaid Invoices', status: 'Overdue' },
        ];

        const CARD_DATA = [
            { id: 'c1', type: 'Visa Infinite', number: '**** 4421', status: 'Active', limit: '$50,000', expiry: '05/27' },
            { id: 'c2', type: 'Mastercard Gold', number: '**** 8890', status: 'Blocked', limit: '$10,000', expiry: '11/25' },
            { id: 'c3', type: 'Corporate Card', number: '**** 1120', status: 'Active', limit: '$100,000', expiry: '01/26' },
        ];

        const TRANSACTIONS = [
            { id: 1, date: '2023-10-10', desc: 'Amazon.com', amount: -124.50, status: 'Completed' },
            { id: 2, date: '2023-10-09', desc: 'Starbucks Coffee', amount: -6.45, status: 'Completed' },
            { id: 3, date: '2023-10-09', desc: 'Apple Store', amount: -999.00, status: 'Pending' },
            { id: 4, date: '2023-10-08', desc: 'Gas Station', amount: -45.00, status: 'Completed' },
            { id: 5, date: '2023-10-07', desc: 'Salary Deposit', amount: 5500.00, status: 'Completed' },
        ];

        // --- Components ---
        const App = () => {
            const [view, setView] = useState('identify'); // identify, dashboard, details
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [searchType, setSearchType] = useState('National ID');
            const [searchValue, setSearchValue] = useState('');

            const searchOptions = [
                'National ID', 'Phone Number', 'Email', 'Date Of Birth', 'Credit Card Number', 'Customer ID'
            ];

            const handleIdentify = (e) => {
                e.preventDefault();
                if (searchValue.trim()) setView('dashboard');
            };

            const navigateToDetails = (cat) => {
                setSelectedCategory(cat);
                setView('details');
            };

            const renderView = () => {
                switch (view) {
                    case 'identify':
                        return (
                            <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                                <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 space-y-6 border border-slate-100">
                                    <div className="text-center space-y-2">
                                        <div className="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                                            <User className="text-white w-8 h-8" />
                                        </div>
                                        <h1 className="text-2xl font-bold text-slate-800">CustBuddy</h1>
                                        <p className="text-slate-500">Customer Identification Portal</p>
                                    </div>
                                    <form onSubmit={handleIdentify} className="space-y-4">
                                        <div className="space-y-1">
                                            <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Identification Method</label>
                                            <select 
                                                value={searchType}
                                                onChange={(e) => setSearchType(e.target.value)}
                                                className="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                                            >
                                                {searchOptions.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Enter {searchType}</label>
                                            <div className="relative">
                                                <Search className="absolute left-4 top-3.5 text-slate-400 w-5 h-5" />
                                                <input 
                                                    type="text"
                                                    placeholder={`Enter value...`}
                                                    className="w-full bg-slate-50 border border-slate-200 rounded-lg pl-12 pr-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                                                    value={searchValue}
                                                    onChange={(e) => setSearchValue(e.target.value)}
                                                    required
                                                />
                                            </div>
                                        </div>
                                        <button 
                                            type="submit"
                                            className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg shadow-lg shadow-blue-100 transition-all transform active:scale-[0.98]"
                                        >
                                            Identify Customer
                                        </button>
                                    </form>
                                    <div className="pt-4 border-t border-slate-100">
                                        <p className="text-center text-xs text-slate-400 mb-3">RECENT SEARCHES</p>
                                        <div className="space-y-2">
                                            <div onClick={() => {setSearchValue('NID-8827-X'); setView('dashboard');}} className="flex items-center justify-between p-3 rounded-lg hover:bg-slate-50 cursor-pointer transition-colors border border-transparent hover:border-slate-200">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-xs font-bold">AS</div>
                                                    <div>
                                                        <p className="text-sm font-semibold text-slate-700">Alexander Sterling</p>
                                                        <p className="text-xs text-slate-400">NID-8827-X</p>
                                                    </div>
                                                </div>
                                                <ChevronRight className="w-4 h-4 text-slate-300" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case 'dashboard':
                        return (
                            <div className="min-h-screen bg-slate-50">
                                <header className="bg-white border-b border-slate-200 sticky top-0 z-10 px-6 py-4">
                                    <div className="max-w-7xl mx-auto flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            <div className="bg-blue-600 p-2 rounded-lg text-white">
                                                <User className="w-6 h-6" />
                                            </div>
                                            <div>
                                                <h2 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                                                    {CUSTOMER_DATA.name}
                                                    <span className="bg-emerald-100 text-emerald-700 text-[10px] uppercase px-2 py-0.5 rounded-full font-bold">
                                                        {CUSTOMER_DATA.status}
                                                    </span>
                                                </h2>
                                                <p className="text-xs text-slate-500 uppercase tracking-widest font-semibold">Customer ID: {CUSTOMER_DATA.id} • {CUSTOMER_DATA.tier} Tier</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <button className="p-2 text-slate-400 hover:text-blue-600 transition-colors bg-slate-50 rounded-full">
                                                <Bell className="w-5 h-5" />
                                            </button>
                                            <button 
                                                onClick={() => setView('identify')}
                                                className="flex items-center gap-2 px-4 py-2 border border-slate-200 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors"
                                            >
                                                <LogOut className="w-4 h-4" /> Exit
                                            </button>
                                        </div>
                                    </div>
                                </header>

                                <main className="max-w-7xl mx-auto p-6 space-y-8">
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-wrap gap-8">
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Email Address</label>
                                            <p className="text-sm font-semibold text-slate-700">{CUSTOMER_DATA.email}</p>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Mobile Phone</label>
                                            <p className="text-sm font-semibold text-slate-700">{CUSTOMER_DATA.phone}</p>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Date of Birth</label>
                                            <p className="text-sm font-semibold text-slate-700">{CUSTOMER_DATA.dob}</p>
                                        </div>
                                        <div className="ml-auto flex gap-2">
                                            <button className="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-100 transition-all flex items-center gap-2">
                                                <PlusCircle className="w-4 h-4" /> New Service
                                            </button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {CATEGORIES.map((cat) => (
                                            <div 
                                                key={cat.id}
                                                onClick={() => navigateToDetails(cat)}
                                                className="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm hover:shadow-md transition-all cursor-pointer group hover:-translate-y-1"
                                            >
                                                <div className="flex items-start justify-between mb-4">
                                                    <div className={`${cat.color} p-3 rounded-xl text-white shadow-lg`}>
                                                        <cat.icon className="w-6 h-6" />
                                                    </div>
                                                    <div className="text-right">
                                                        <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded-full ${
                                                            cat.status === 'Active' || cat.status === 'Good' || cat.status === 'Secure' ? 'bg-green-50 text-green-600' : 'bg-amber-50 text-amber-600'
                                                        }`}>
                                                            {cat.status}
                                                        </span>
                                                    </div>
                                                </div>
                                                
                                                <h3 className="font-bold text-slate-800 text-lg group-hover:text-blue-600 transition-colors">{cat.name}</h3>
                                                
                                                <div className="mt-4 bg-slate-50 rounded-lg p-3 border border-slate-100 group-hover:bg-blue-50/50 transition-colors">
                                                    <p className="text-xs text-slate-500 font-medium mb-1 uppercase tracking-tighter">Glance Info</p>
                                                    <p className="text-sm font-bold text-slate-700">{cat.summary}</p>
                                                </div>

                                                <div className="mt-4 flex items-center text-xs font-bold text-blue-600 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    Manage Details <ChevronRight className="w-3 h-3 ml-1" />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </main>
                            </div>
                        );
                    case 'details':
                        return (
                            <div className="min-h-screen bg-slate-50">
                                <div className="bg-white border-b border-slate-200 sticky top-0 z-10">
                                    <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            <button 
                                                onClick={() => setView('dashboard')}
                                                className="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition-colors"
                                            >
                                                <ArrowLeft className="w-5 h-5" />
                                            </button>
                                            <div className="flex items-center gap-3">
                                                <div className={`${selectedCategory.color} p-2 rounded-lg text-white`}>
                                                    <selectedCategory.icon className="w-5 h-5" />
                                                </div>
                                                <h2 className="font-bold text-slate-800 text-lg">{selectedCategory.name} Details</h2>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="text-right hidden md:block">
                                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">Active Customer</p>
                                                <p className="text-sm font-bold text-slate-700 leading-none">{CUSTOMER_DATA.name}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <main className="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
                                    <aside className="lg:col-span-1 flex lg:flex-col gap-2 overflow-x-auto lg:overflow-visible pb-4 lg:pb-0">
                                        {CATEGORIES.map(cat => (
                                            <button 
                                                key={cat.id}
                                                onClick={() => setSelectedCategory(cat)}
                                                className={`p-3 rounded-xl transition-all shrink-0 ${
                                                    selectedCategory.id === cat.id 
                                                    ? `${cat.color} text-white shadow-lg` 
                                                    : 'bg-white text-slate-400 hover:bg-white hover:text-slate-600 border border-slate-200'
                                                }`}
                                                title={cat.name}
                                            >
                                                <cat.icon className="w-6 h-6" />
                                            </button>
                                        ))}
                                    </aside>

                                    <div className="lg:col-span-11 space-y-6">
                                        
                                        {selectedCategory.id === 'cards' ? (
                                            <>
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                    {CARD_DATA.map((card, idx) => (
                                                        <div 
                                                            key={card.id} 
                                                            className={`relative overflow-hidden p-6 rounded-2xl shadow-lg border border-slate-200 min-h-[180px] flex flex-col justify-between ${
                                                                card.status === 'Active' ? 'bg-gradient-to-br from-slate-800 to-slate-900 text-white' : 'bg-white text-slate-400'
                                                            }`}
                                                        >
                                                            {card.status === 'Active' && <div className="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/20 blur-3xl rounded-full" />}
                                                            
                                                            <div className="flex justify-between items-start">
                                                                <div>
                                                                    <p className="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-1">{card.type}</p>
                                                                    <p className="font-mono text-lg tracking-[0.2em]">{card.number}</p>
                                                                </div>
                                                                <CreditCard className={`w-8 h-8 ${card.status === 'Active' ? 'text-white/20' : 'text-slate-100'}`} />
                                                            </div>

                                                            <div className="flex justify-between items-end">
                                                                <div>
                                                                    <p className="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-1">Limit</p>
                                                                    <p className="font-bold">{card.limit}</p>
                                                                </div>
                                                                <div className="text-right">
                                                                    <p className="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-1">Status</p>
                                                                    <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold ${
                                                                        card.status === 'Active' ? 'bg-emerald-500 text-white' : 'bg-red-100 text-red-600'
                                                                    }`}>{card.status}</span>
                                                                </div>
                                                            </div>

                                                            <div className="absolute bottom-0 left-0 right-0 p-3 bg-white/5 backdrop-blur-md flex justify-around border-t border-white/10 mt-4">
                                                                <button className="text-[10px] font-bold flex flex-col items-center gap-1 hover:text-blue-400 transition-colors">
                                                                    <Lock className="w-3.5 h-3.5" /> Block
                                                                </button>
                                                                <button className="text-[10px] font-bold flex flex-col items-center gap-1 hover:text-blue-400 transition-colors">
                                                                    <RefreshCcw className="w-3.5 h-3.5" /> Reset PIN
                                                                </button>
                                                                <button className="text-[10px] font-bold flex flex-col items-center gap-1 hover:text-blue-400 transition-colors">
                                                                    <CreditCard className="w-3.5 h-3.5" /> Renew
                                                                </button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                    <button className="border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center p-6 text-slate-400 hover:border-blue-300 hover:text-blue-500 hover:bg-blue-50 transition-all gap-2">
                                                        <PlusCircle className="w-8 h-8" />
                                                        <span className="font-bold text-sm">Issue New Card</span>
                                                    </button>
                                                </div>

                                                <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                                    <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                                        <h3 className="font-bold text-slate-800">Recent Transactions (Last 10 Activities)</h3>
                                                        <button className="text-xs font-bold text-blue-600 hover:underline">View All Statement</button>
                                                    </div>
                                                    <div className="overflow-x-auto">
                                                        <table className="w-full">
                                                            <thead>
                                                                <tr className="bg-white text-[10px] font-bold text-slate-400 uppercase tracking-widest text-left">
                                                                    <th className="px-6 py-4">Date</th>
                                                                    <th className="px-6 py-4">Description</th>
                                                                    <th className="px-6 py-4">Status</th>
                                                                    <th className="px-6 py-4 text-right">Amount</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody className="divide-y divide-slate-50">
                                                                {TRANSACTIONS.map(tx => (
                                                                    <tr key={tx.id} className="hover:bg-slate-50 transition-colors">
                                                                        <td className="px-6 py-4 text-sm text-slate-500 font-medium">{tx.date}</td>
                                                                        <td className="px-6 py-4">
                                                                            <p className="text-sm font-bold text-slate-700">{tx.desc}</p>
                                                                            <p className="text-[10px] text-slate-400 font-semibold uppercase">POS Transaction</p>
                                                                        </td>
                                                                        <td className="px-6 py-4">
                                                                            <span className={`text-[10px] font-bold px-2 py-1 rounded-md ${
                                                                                tx.status === 'Completed' ? 'bg-green-50 text-green-600' : 'bg-amber-50 text-amber-600'
                                                                            }`}>
                                                                                {tx.status}
                                                                            </span>
                                                                        </td>
                                                                        <td className={`px-6 py-4 text-sm font-bold text-right ${tx.amount < 0 ? 'text-slate-800' : 'text-emerald-600'}`}>
                                                                            {tx.amount < 0 ? '-' : '+'}${Math.abs(tx.amount).toFixed(2)}
                                                                        </td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>

                                                <div className="bg-white p-4 rounded-xl border border-slate-200 flex items-center justify-between gap-4 shadow-sm">
                                                    <p className="text-xs font-bold text-slate-500 uppercase px-4 border-r border-slate-100">Global Card Actions</p>
                                                    <div className="flex gap-3 flex-1 overflow-x-auto pb-1 md:pb-0">
                                                        <button className="whitespace-nowrap px-4 py-2 bg-slate-800 text-white rounded-lg text-xs font-bold hover:bg-slate-900 flex items-center gap-2">
                                                            <Lock className="w-3 h-3" /> Stop All Cards
                                                        </button>
                                                        <button className="whitespace-nowrap px-4 py-2 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold hover:bg-blue-100 flex items-center gap-2">
                                                            <RefreshCcw className="w-3 h-3" /> Mass Re-issue
                                                        </button>
                                                        <button className="whitespace-nowrap px-4 py-2 bg-slate-50 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-100 flex items-center gap-2">
                                                            <FileText className="w-3 h-3" /> Tax Reports
                                                        </button>
                                                    </div>
                                                </div>
                                            </>
                                        ) : (
                                            <div className="bg-white rounded-2xl p-12 border border-slate-200 text-center space-y-4 shadow-sm">
                                                <div className={`${selectedCategory.color} w-16 h-16 rounded-2xl flex items-center justify-center mx-auto text-white shadow-xl`}>
                                                    <selectedCategory.icon className="w-8 h-8" />
                                                </div>
                                                <h3 className="text-xl font-bold text-slate-800">{selectedCategory.name} Workspace</h3>
                                                <p className="text-slate-500 max-w-sm mx-auto">This module is currently active. For this prototype, please select the "Cards" category to see a deep-dive interaction example.</p>
                                                <button className="px-6 py-2 bg-slate-100 text-slate-600 font-bold rounded-lg text-sm hover:bg-slate-200 transition-colors">
                                                    Configure Category
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </main>
                            </div>
                        );
                    default:
                        return null;
                }
            };

            return (
                <div className="font-sans text-slate-900">
                    {renderView()}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
